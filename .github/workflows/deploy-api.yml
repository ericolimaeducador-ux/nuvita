name: Deploy API to Cloud Run

# Faz build da imagem (Dockerfile na raiz) e deploy da API no Google Cloud Run.
#
# Autenticação via Workload Identity Federation (OIDC) — sem chave de SA de longa
# duração. Secrets (Settings > Secrets and variables > Actions):
#   - GCP_PROJECT_ID       ID do projeto GCP (ex.: nuvita-499800).
#   - GCP_WIF_PROVIDER     Resource name do provider WIF
#                          (projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<prov>).
#   - GCP_SA_EMAIL         E-mail da service account de deploy.
#   - CLOUDRUN_ENV_YAML    Conteúdo COMPLETO do cloudrun.env.yaml (segredos da API).
#                          Gere com `node scripts/gen-cloudrun-env.cjs` e cole aqui.
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'Dockerfile'
      - '.gcloudignore'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

# Um deploy por vez; não cancela um deploy em andamento.
concurrency:
  group: cloud-run-api
  cancel-in-progress: false

# id-token: write é obrigatório para o OIDC do Workload Identity Federation.
permissions:
  contents: read
  id-token: write

env:
  SERVICE: nuvita-api
  REGION: southamerica-east1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Write env-vars file (masked)
        env:
          # Passa o secret via env (expandido em runtime) em vez de interpolar no
          # script: os valores são JSON-quoted (contêm aspas) e quebrariam o shell.
          CLOUDRUN_ENV: ${{ secrets.CLOUDRUN_ENV_YAML }}
        run: |
          printf '%s' "$CLOUDRUN_ENV" > cloudrun.env.yaml
          echo "Linhas no env-vars-file: $(wc -l < cloudrun.env.yaml)"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --env-vars-file cloudrun.env.yaml \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --format='value(status.url)'

      - name: Cleanup secrets file
        if: always()
        run: rm -f cloudrun.env.yaml
