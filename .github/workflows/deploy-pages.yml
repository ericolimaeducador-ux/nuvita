name: Deploy Web to GitHub Pages

# Publica o frontend (apps/web) no GitHub Pages.
# Pré-requisito (uma vez): Settings > Pages > Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy por vez (sem cancelar o que já está publicando).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build web
        working-directory: apps/web
        env:
          # Domínio próprio www.nuvita.app.br (ver apps/web/public/CNAME) serve na raiz.
          VITE_BASE: /
          # URL pública da API (HTTPS). Secret VITE_API_URL = https://api.nuvita.app.br.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
