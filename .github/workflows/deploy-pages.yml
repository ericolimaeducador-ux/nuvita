name: Deploy Web to GitHub Pages

# Publica o frontend (apps/web) no GitHub Pages.
# Pré-requisito (uma vez): Settings > Pages > Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy por vez (sem cancelar o que já está publicando).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build web
        working-directory: apps/web
        env:
          # Base path do projeto no Pages: https://<user>.github.io/nuvita/
          # Para domínio próprio, troque para '/'.
          VITE_BASE: /nuvita/
          # URL pública da API (HTTPS). Defina o secret VITE_API_URL no repositório
          # quando a API estiver hospedada; vazio = sem backend (front só carrega).
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
