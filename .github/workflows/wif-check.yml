name: WIF Check

# Validação isolada do Workload Identity Federation: autentica via OIDC e exercita
# as permissões da service account de deploy, SEM fazer deploy. Pode ser removido.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check:
    name: Verify WIF auth & SA permissions
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Identity
        run: |
          echo "== gcloud auth list =="
          gcloud auth list
          echo "== projeto ativo =="
          gcloud config get-value project

      - name: Cloud Run access (testa roles/run.admin)
        run: gcloud run services list --region southamerica-east1

      - name: Artifact Registry access (testa roles/artifactregistry.admin)
        run: gcloud artifacts repositories list --location southamerica-east1
