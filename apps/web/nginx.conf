server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Encaminha as rotas da API para o serviço NestJS preservando o path
  # (necessário para o cookie de refresh httpOnly em /auth).
  # Como /pacientes, /prontuarios, ... também são rotas do SPA, um reload do
  # navegador (Accept: text/html) é servido pelo index.html; XHR/JSON vai p/ API.
  location ~ ^/(auth|clinicas|pacientes|agendamentos|prontuarios|documentos|notificacoes|financeiro|telemedicina|super-admin|analytics|avaliacao-iu|followup|laudo-medico|processo-juridico|produtos|entregas|health|anotacoes-juridicas|checklist-documentos)(/|$) {
    if ($http_accept ~* "text/html") {
      rewrite ^ /index.html last;
    }
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # cache de assets versionados
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
